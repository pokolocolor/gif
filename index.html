<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>이미지를 GIF로 변환</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            text-align: center;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .file-input-wrapper {
            position: relative;
            display: block;
            width: 100%;
        }

        #imageInput {
            display: none;
        }

        .file-input-label {
            display: block;
            width: 100%;
            padding: 15px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background-color: #f8f9ff;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .file-input-label:active {
            background-color: #f0f2ff;
            border-color: #764ba2;
        }

        .file-count {
            margin-top: 8px;
            color: #667eea;
            font-size: 13px;
            font-weight: 500;
        }

        .file-count.error {
            color: #e74c3c;
        }

        .preview-section {
            margin-bottom: 20px;
        }

        .preview-label {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .preview-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
            padding: 8px;
            background-color: #f8f9ff;
            border-radius: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .preview-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #e0e0e0;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .preview-number {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 11px;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            min-height: 44px;
        }

        .btn-create {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-create:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-create:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-clear {
            background: #ecf0f1;
            color: #333;
        }

        .btn-clear:active {
            background: #d5dbdb;
        }

        .progress-section {
            display: none;
            margin-bottom: 15px;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.2s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .result-section {
            display: none;
            text-align: center;
        }

        .result-section.show {
            display: block;
        }

        .result-gif {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #ecf0f1;
        }

        .result-info {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            min-height: 44px;
            font-size: 16px;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            display: none;
            background: #fadbd8;
            color: #c0392b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .preview-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 이미지를 GIF로</h1>
        <p class="subtitle">15장의 이미지로 1초짜리 GIF 생성</p>

        <div class="error-message" id="errorMessage"></div>

        <div class="input-group">
            <label for="imageInput">이미지 선택 (15장)</label>
            <div class="file-input-wrapper">
                <input type="file" id="imageInput" multiple accept="image/*">
                <label for="imageInput" class="file-input-label">
                    📁 파일 선택
                </label>
            </div>
            <div class="file-count" id="fileCount">선택됨: 0장</div>
        </div>

        <div class="preview-section" id="previewSection" style="display:none;">
            <div class="preview-label">미리보기</div>
            <div class="preview-container" id="previewContainer"></div>
        </div>

        <div class="button-group">
            <button class="btn-create" id="createBtn" disabled>GIF 생성</button>
            <button class="btn-clear" id="clearBtn">초기화</button>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">처리 중...</div>
        </div>

        <div class="result-section" id="resultSection">
            <img id="resultGif" class="result-gif" alt="생성된 GIF">
            <div class="result-info" id="resultInfo"></div>
            <button class="download-btn" id="downloadBtn">📥 다운로드</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/omggif@1.0.10/gifs.js"></script>

    <script>
        let selectedFiles = [];
        let resultGifBlob = null;

        const imageInput = document.getElementById('imageInput');
        const fileCount = document.getElementById('fileCount');
        const previewContainer = document.getElementById('previewContainer');
        const previewSection = document.getElementById('previewSection');
        const createBtn = document.getElementById('createBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultSection = document.getElementById('resultSection');
        const resultGif = document.getElementById('resultGif');
        const resultInfo = document.getElementById('resultInfo');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMessage = document.getElementById('errorMessage');

        imageInput.addEventListener('change', handleFileSelect);
        createBtn.addEventListener('click', createGif);
        clearBtn.addEventListener('click', clearAll);
        downloadBtn.addEventListener('click', downloadGif);

        function handleFileSelect(e) {
            selectedFiles = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name));
            updateUI();
        }

        function updateUI() {
            fileCount.textContent = `선택됨: ${selectedFiles.length}장`;
            
            if (selectedFiles.length > 0) {
                previewSection.style.display = 'block';
                displayPreviews();
            } else {
                previewSection.style.display = 'none';
            }

            if (selectedFiles.length === 15) {
                createBtn.disabled = false;
                fileCount.classList.remove('error');
                errorMessage.classList.remove('show');
            } else {
                createBtn.disabled = true;
                if (selectedFiles.length > 0 && selectedFiles.length !== 15) {
                    fileCount.classList.add('error');
                    errorMessage.classList.add('show');
                    errorMessage.textContent = `⚠️ 정확히 15장 필요 (현재: ${selectedFiles.length}장)`;
                }
            }
        }

        function displayPreviews() {
            previewContainer.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';
                    item.innerHTML = `
                        <img src="${e.target.result}" alt="preview">
                        <div class="preview-number">${index + 1}</div>
                    `;
                    previewContainer.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        function clearAll() {
            imageInput.value = '';
            selectedFiles = [];
            previewContainer.innerHTML = '';
            resultSection.classList.remove('show');
            progressSection.classList.remove('show');
            errorMessage.classList.remove('show');
            fileCount.classList.remove('error');
            updateUI();
        }

        async function createGif() {
            if (selectedFiles.length !== 15) {
                alert('정확히 15장을 선택하세요');
                return;
            }

            createBtn.disabled = true;
            progressSection.classList.add('show');
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');

            try {
                progressText.textContent = '이미지 로드 중...';
                progressFill.style.width = '10%';

                // 이미지 로드
                const images = await Promise.all(
                    selectedFiles.map((file, index) => {
                        progressFill.style.width = `${10 + (index / 15) * 20}%`;
                        return loadImage(file);
                    })
                );

                progressFill.style.width = '40%';
                progressText.textContent = 'GIF 인코딩 중...';

                // omggif로 GIF 생성
                const gif = new GifWriter(new Uint8Array(1024 * 100), images[0].width, images[0].height, { workerScript: null });

                images.forEach((img, index) => {
                    progressFill.style.width = `${40 + (index / 15) * 50}%`;
                    progressText.textContent = `프레임 추가: ${index + 1}/15`;
                    
                    const canvas = img.canvas;
                    const ctx = canvas.getContext('2d');
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    gif.addFrame(data, 67); // 67ms delay
                });

                progressFill.style.width = '95%';
                progressText.textContent = '파일 생성 중...';

                const gifData = gif.end();
                const blob = new Blob([gifData], { type: 'image/gif' });

                resultGifBlob = blob;
                const url = URL.createObjectURL(blob);
                resultGif.src = url;
                resultInfo.innerHTML = `
                    ✅ 완료!<br>
                    크기: ${(blob.size / 1024).toFixed(1)} KB
                `;
                resultSection.classList.add('show');
                progressSection.classList.remove('show');
                createBtn.disabled = false;

            } catch (error) {
                console.error('에러:', error);
                errorMessage.classList.add('show');
                errorMessage.textContent = `❌ ${error.message}`;
                progressSection.classList.remove('show');
                createBtn.disabled = false;
            }
        }

        function loadImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 300;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = Math.round(img.height * scale);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve({ canvas, width: canvas.width, height: canvas.height });
                    };
                    img.onerror = () => reject(new Error(`로드 실패: ${file.name}`));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error(`파일 읽기 실패: ${file.name}`));
                reader.readAsDataURL(file);
            });
        }

        function downloadGif() {
            if (!resultGifBlob) return;
            
            const url = URL.createObjectURL(resultGifBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `animation-${Date.now()}.gif`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
